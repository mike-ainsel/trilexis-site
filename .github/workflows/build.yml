name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # k3s node is arm64 — build multi-arch so it can pull a runnable image.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag shape "main-<sha>-<epoch>" so Flux ImagePolicy can numerically sort.
      - id: tag
        run: echo "value=main-${GITHUB_SHA::7}-$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository }}:latest
